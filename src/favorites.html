                  <p>Daily norm of sports</p>
                </div>

                <picture class="favorites-picture">
                  <source
                    media="(min-width: 1440px)"
                    srcset="
                      ./images/favorites/favorites-desktop.jpg    1x,
                      ./images/favorites/favorites-desktop@2x.jpg 2x
                    "
                  />

                  <source
                    media="(min-width: 768px)"
                    srcset="
                      ./images/favorites/favorites-tablet.jpg    1x,
                      ./images/favorites/favorites-tablet@2x.jpg 2x
                    "
                  />

                  <img
                    class="favorites-img"
                    src="./images/favorites/favorites-mobile.jpg"
                    srcset="./images/favorites/favorites-mobile@2x.jpg 2x"
                    alt="Women doing sports"
                    loading="lazy"
                  />
                </picture>

            </div>

            <div class="content-area">
              <ul class="exercises-list" data-favorites-list></ul>
              <p class="empty-message is-hidden" data-favorites-empty>
